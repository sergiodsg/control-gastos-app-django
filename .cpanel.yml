---
deployment:
  tasks:
    - export DEPLOY_PATH=/home/ssapmcco/apps/CashFlow
    - export REPO_PATH=/home/ssapmcco/repositories/CashFlow

    # Eliminar archivos y directorios excepto los que deben preservarse
    # Proteger: logs/, tmp/, passenger_wsgi.py, passenger_wsgi.pyc, .htaccess, archivos .log
    - /usr/bin/find $DEPLOY_PATH -mindepth 1 -maxdepth 1 ! -name "logs" ! -name "tmp" ! -name "passenger_wsgi.py" ! -name "passenger_wsgi.pyc" ! -name ".htaccess" ! -name "*.log" -exec rm -rf {} \;

    # Sincronizar desde el repositorio, excluyendo archivos sensibles y de desarrollo
    # IMPORTANTE: Excluir archivos que NO deben sobrescribirse en producción
    - /bin/rsync -avz --exclude='.git*' --exclude='.cpanel.yml' --exclude='tests/' --exclude='.env' --exclude='correo.env' --exclude='key.env' --exclude='*.log' --exclude='logs/*.log' --exclude='passenger_wsgi.py' --exclude='passenger_wsgi.pyc' --exclude='.htaccess' --exclude='__pycache__' --exclude='*.pyc' --exclude='*.pyo' --exclude='.DS_Store' $REPO_PATH/ $DEPLOY_PATH/

    # Asegurar que passenger_wsgi.py tenga permisos de ejecución (si existe)
    - chmod +x $DEPLOY_PATH/passenger_wsgi.py 2>/dev/null || true

    # Asegurar que el directorio logs exista y tenga permisos correctos
    - mkdir -p $DEPLOY_PATH/logs
    - chmod 755 $DEPLOY_PATH/logs